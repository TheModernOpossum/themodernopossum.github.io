<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Lightbox</title>
    <link rel="stylesheet" type="text/css" href="css/main.css">
</head>
<body>

<div class="iframe-container">
    <iframe id="projectIframe" width="100%" height="600px" frameborder="0" allowfullscreen></iframe>
</div>

<script>
    // Extract the project name from the URL
    const params = new URLSearchParams(window.location.search);
    const project = params.get('project');

    // Define project URLs
    const projectURLs = {
        "lux-datum": "https://lux-datum.vercel.app",
        "second-project": "https://example.com/project2"
    };

    // Set the iframe source dynamically
    document.getElementById("projectIframe").src = projectURLs[project] || "about:blank";
</script>

</body>
</html>
